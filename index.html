<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Container Training Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 2.5rem;
      max-width: 640px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }

    .badge {
      display: inline-block;
      background: #e53e3e;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #718096;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .info-item {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 1rem;
    }

    .info-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #4a5568;
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-size: 0.9rem;
      color: #a0aec0;
      font-family: "SFMono-Regular", Consolas, monospace;
      word-break: break-all;
    }

    .tech-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .tech-tag {
      background: #2d3748;
      color: #90cdf4;
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      font-weight: 500;
    }

    .footer {
      border-top: 1px solid #2d3748;
      padding-top: 1.2rem;
      font-size: 0.8rem;
      color: #4a5568;
      text-align: center;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #48bb78;
      border-radius: 50%;
      margin-right: 0.4rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Training Demo</div>
    <h1>Container App</h1>
    <p class="subtitle">
      <span class="status-dot"></span>
      Running successfully inside a container
    </p>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Hostname / Pod</div>
        <div class="info-value" id="hostname">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">Server Time</div>
        <div class="info-value" id="time">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">Port</div>
        <div class="info-value" id="port">—</div>
      </div>
      <div class="info-item">
        <div class="info-label">User Agent</div>
        <div class="info-value" id="ua">—</div>
      </div>
    </div>

    <div class="tech-list">
      <span class="tech-tag">Python 3.12</span>
      <span class="tech-tag">http.server</span>
      <span class="tech-tag">Docker</span>
      <span class="tech-tag">Podman</span>
      <span class="tech-tag">Kubernetes</span>
      <span class="tech-tag">OpenShift</span>
    </div>

    <div class="footer">
      python-simpleapp &mdash; container training demo &mdash; v3.0
    </div>
  </div>

  <script>
    document.getElementById("hostname").textContent = location.hostname || "localhost";
    document.getElementById("port").textContent = location.port || "80";
    document.getElementById("time").textContent = new Date().toLocaleTimeString();
    document.getElementById("ua").textContent =
      navigator.userAgent.split(" ").slice(-2).join(" ");
    setInterval(() => {
      document.getElementById("time").textContent = new Date().toLocaleTimeString();
    }, 1000);
  </script>
</body>
</html>
